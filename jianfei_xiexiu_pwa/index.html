<title>减肥邪修 APP</title>
<style>
:root{--red:#FF4D4F;--red2:#ff7072;--green:#36D399;--purple:#6C5CE7;--orange:#FF8A45;--cyan:#22C7D9;--bg:#F5F7FA;--ink:#1D2129;--muted:#86909C;--line:#EDF0F6;--card:#fff;--shadow:0 18px 45px rgba(31,45,61,.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#dfe8f3;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink)}button,input,select{font:inherit}.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;background:radial-gradient(circle at 50% 0,#f0f6ff,#dfe8f3 58%,#d8e2ef)}.phone{width:390px;height:844px;max-width:100vw;max-height:100vh;background:var(--bg);border:10px solid #fff;border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}.phone:before{content:"";position:absolute;left:135px;top:8px;width:120px;height:5px;border-radius:999px;background:#d8dee9;z-index:5}.screen{height:100%;overflow:auto;padding:30px 18px 92px;scrollbar-width:none}.screen::-webkit-scrollbar{display:none}.top{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px}.hello{font-size:24px}.hello b{font-style:italic}.iconbtn{width:40px;height:40px;border:0;border-radius:14px;background:#fff;display:grid;place-items:center;box-shadow:0 6px 16px rgba(31,45,61,.05)}.search{height:48px;border-radius:14px;background:#EEF2F8;color:#A7AFBD;display:flex;align-items:center;gap:10px;padding:0 14px;margin:10px 0 20px}.hero{border-radius:28px;background:linear-gradient(135deg,#fff 0,#fff 56%,#ffe0e0 100%);padding:20px;box-shadow:0 12px 28px rgba(31,45,61,.08);position:relative;overflow:hidden}.hero h1{font-size:30px;line-height:1.08;margin:0 0 8px}.hero p{margin:0 0 16px;color:var(--muted);font-size:13px;line-height:1.5}.stamp{position:absolute;right:-6px;bottom:-8px;font-size:92px;opacity:.11}.btn{border:0;border-radius:17px;height:50px;padding:0 20px;background:var(--red);color:#fff;font-weight:900;box-shadow:0 12px 22px rgba(255,77,79,.24)}.btn.block{width:100%}.btn.purple{background:var(--purple);box-shadow:0 12px 22px rgba(108,92,231,.22)}.btn.green{background:var(--green);box-shadow:0 12px 22px rgba(54,211,153,.22)}.btn.ghost{background:#fff;color:var(--purple);border:1px solid var(--line);box-shadow:none}.section{font-size:20px;font-weight:900;margin:20px 0 12px;display:flex;align-items:center;justify-content:space-between}.more{font-size:13px;color:var(--purple);font-weight:800}.card{background:#fff;border-radius:24px;padding:18px;box-shadow:0 8px 22px rgba(31,45,61,.06);margin-bottom:14px}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 11px;background:#F2F4F8;color:#697386;font-size:12px;font-weight:800}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.check{border:0;border-radius:22px;background:#fff;padding:16px 8px;box-shadow:0 8px 22px rgba(31,45,61,.06);text-align:center;position:relative}.check.done:after{content:"✓";position:absolute;right:8px;top:8px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:var(--green);color:#fff;font-weight:900}.check .emoji{font-size:30px;margin-bottom:8px}.check b{font-size:15px}.check small{display:block;color:var(--muted);margin-top:5px}.progress{height:10px;background:#EEF1F6;border-radius:999px;overflow:hidden}.bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--orange))}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}.metric{border-radius:20px;background:#fff;padding:15px}.metric span{color:var(--muted);font-size:12px}.metric b{display:block;font-size:24px;margin-top:5px}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{height:50px;border-radius:16px;background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}.day b{font-size:16px;color:var(--ink)}.day.done{border:2px solid var(--green);color:var(--green)}.day.miss{border:2px solid var(--red);color:var(--red)}.day.today{background:var(--purple);border:0;color:#fff}.day.today b{color:#fff}.nav{position:absolute;bottom:0;left:0;right:0;height:72px;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center}.nav button{border:0;background:transparent;color:#9AA2B2;font-size:11px;font-weight:800}.nav button.active{color:var(--red)}.nav i{font-style:normal;display:block;font-size:22px;margin-bottom:4px}.statbig{border-radius:26px;background:linear-gradient(135deg,var(--purple),#8175F2);color:#fff;padding:22px;display:flex;gap:18px;align-items:center}.ring{width:116px;height:116px;border-radius:50%;border:10px solid rgba(255,255,255,.25);border-left-color:#fff;display:grid;place-items:center;font-size:24px;font-weight:900}.chart{height:160px;border-radius:22px;background:linear-gradient(180deg,#fff,#FAFBFE);position:relative;overflow:hidden}.workout{border-radius:24px;background:#BDEBFF;padding:18px;position:relative;overflow:hidden;margin-bottom:14px;min-height:154px}.workout h3{margin:0 0 7px;font-size:18px}.workout .person{position:absolute;right:7px;bottom:-6px;font-size:82px}.tabs{display:flex;gap:18px;overflow:auto;border-bottom:1px solid var(--line);padding-bottom:10px;color:#697386;font-weight:800;font-size:14px}.tabs button{border:0;background:transparent;color:inherit;white-space:nowrap;padding:0 0 10px}.tabs button.active{color:var(--purple);border-bottom:3px solid var(--purple)}.mealHero{text-align:center}.mealHero .food{font-size:92px}.list{display:grid;gap:10px}.row{display:flex;align-items:center;gap:12px;border-radius:20px;background:#fff;padding:14px;box-shadow:0 8px 22px rgba(31,45,61,.05)}.row .badge{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:#F2F4F8;font-size:24px}.row .grow{flex:1}.row h4{margin:0;font-size:16px}.row p{margin:4px 0 0;color:var(--muted);font-size:12px}.warn{background:#fff1f0;border-left:5px solid var(--red);border-radius:18px;padding:14px;color:#611a15;line-height:1.5}.success{background:#ecfff8;border-left:5px solid var(--green);border-radius:18px;padding:14px;color:#07543a;line-height:1.5}.modal{position:absolute;inset:0;background:rgba(29,33,41,.32);display:none;align-items:flex-end;z-index:20}.modal.show{display:flex}.sheet{width:100%;background:#fff;border-radius:28px 28px 0 0;padding:22px 18px 26px;box-shadow:0 -16px 40px rgba(0,0,0,.12);animation:up .18s ease}@keyframes up{from{transform:translateY(35px);opacity:.6}to{transform:translateY(0);opacity:1}}.input{width:100%;height:50px;border:1px solid var(--line);border-radius:16px;padding:0 14px;background:#FAFBFE;margin:8px 0 12px}.switch{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:800;color:#697386}.chip.active{background:var(--red);color:#fff;border-color:var(--red)}.profile{display:flex;align-items:center;gap:14px}.avatarbig{width:64px;height:64px;border-radius:22px;background:linear-gradient(135deg,#ffe0e0,#e6e1ff);display:grid;place-items:center;font-size:30px}.disclaimer{font-size:11px;color:#9aa2b2;line-height:1.5;margin-top:14px}.hide{display:none!important}@media(max-width:460px){.app{padding:0}.phone{width:100vw;height:100vh;border:0;border-radius:0}.phone:before{display:none}}
</style>
</head>
<body><div class="app"><main class="phone"><div id="screen" class="screen"></div><nav class="nav" id="nav"></nav><div class="modal" id="modal"><div class="sheet" id="sheet"></div></div></main></div>
<script>
const plan=[
{d:1,date:'6.8 周一',title:'纯半液断日',loss:'1.6斤',rule:'全天主要以无糖液体，严格按计划记录。',meals:['早餐：无糖纯豆浆 500ml + 麦满分一个','午餐：黑咖啡 500ml / 东方树叶茉莉花茶','晚餐：东方树叶茉莉花茶 / 清汤二选一','加餐：温水、无糖气泡水']},
{d:2,date:'6.9 周二',title:'全天玉米日',loss:'1.5斤',rule:'三餐仅水煮玉米，不添加其他食物。',meals:['早餐：水煮玉米 1 根','午餐：水煮玉米 1 根','晚餐：水煮玉米 1 根']},
{d:3,date:'6.10 周三',title:'低糖水果日',loss:'1.2斤',rule:'仅吃指定三款低糖水果，不混吃其他水果。',meals:['早餐：火龙果 1 个','午餐：苹果 1 个','晚餐：蓝莓 100g']},
{d:4,date:'6.11 周四',title:'纯鸡蛋高蛋白日',loss:'1.3斤',rule:'全天水煮蛋/蛋汤/蛋羹，无油无盐。',meals:['早餐：水煮鸡蛋 2 个','午餐：水煮鸡蛋 3 个','晚餐：水煮鸡蛋 2 个']},
{d:5,date:'6.12 周五',title:'纯蔬菜清肠日',loss:'1.0斤',rule:'清水水煮、无油少盐。',meals:['早餐：水煮生菜 200g','午餐：水煮菠菜 200g','晚餐：水煮西兰花 200g']},
{d:6,date:'6.13 周六',title:'轻蛋白蔬果日',loss:'0.9斤',rule:'轻蛋白+蔬果，复食启动。',meals:['早餐：水煮蛋 2 个 + 小番茄 10 颗','午餐：清蒸鸡胸肉 100g + 水煮油麦菜 200g','晚餐：黄瓜 1 根 + 0脂无糖酸奶 200ml']},
{d:7,date:'6.14 周日',title:'低脂纯素日',loss:'0.8斤',rule:'晚餐极简，持续控热量。',meals:['早餐：纯牛奶 300ml + 圣女果','午餐：水煮娃娃菜 250g + 去皮低盐鸡腿 1 个','晚餐：喝汤或不吃']},
{d:8,date:'6.15 周一',title:'高蛋白塑形日',loss:'0.8斤',rule:'高蛋白、低脂、配合训练。',meals:['早餐：0脂无糖酸奶 250ml','午餐：水煮瘦牛肉 80g + 水煮秋葵 200g','晚餐：喝汤或不吃或青菜']},
{d:9,date:'6.16 周二',title:'清淡控卡日',loss:'0.7斤',rule:'外卖轻食也必须可控。',meals:['早餐：拿铁 + 水煮蛋 1 个','午餐：蔬菜沙拉','晚餐：喝汤或不吃']},
{d:10,date:'6.17 周三',title:'生日放纵餐日',loss:'0斤',rule:'适度放纵，不暴饮暴食，七分饱。',meals:['早餐：鸡蛋/牛奶/杂粮任选，七分饱','午餐：生日正餐，少油优先，每样浅尝','晚餐：小块生日蛋糕，搭配无糖茶饮']},
{d:11,date:'6.18 周四',title:'粗粮复食日',loss:'0.6斤',rule:'放纵后回正轨，轻微滞后掉秤。',meals:['早餐：蒸紫薯 100g + 无糖豆浆 300ml','午餐：清汤荞麦面小碗 + 青菜 + 水煮鸡胸肉 80g','晚餐：苹果 1 个 / 喝汤或不吃']},
{d:12,date:'6.19 周五',title:'均衡塑形日',loss:'0.6斤',rule:'蛋白、粗粮、蔬菜均衡。',meals:['早餐：全麦面包 1 片 + 水煮蛋 1 个 + 黑咖啡','午餐：蒸山药 100g + 水煮西兰花 + 瘦牛肉 80g','晚餐：苹果 1 个 / 喝汤或不吃']},
{d:13,date:'6.20 周六',title:'稳体重减脂日',loss:'0.5斤',rule:'家常清淡，稳定执行。',meals:['早餐：玉米半根 + 纯牛奶 250ml','午餐：杂粮饭小半碗 + 白灼菜心 + 去皮鸡腿肉 100g','晚餐：苹果 1 个 / 喝汤或不吃']},
{d:14,date:'6.21 周日',title:'精细控卡日',loss:'0.5斤',rule:'高蛋白+少量粗粮。',meals:['早餐：水煮蛋 2 个 + 小番茄 10 颗','午餐：荞麦饭小半碗 + 清蒸鱼肉 120g + 水煮生菜','晚餐：喝汤或不吃']},
{d:15,date:'6.22 周一',title:'完美过渡维稳日',loss:'0.4斤',rule:'正常过渡，不暴食。',meals:['早餐：全麦面包 1 片 + 纯牛奶 + 水煮蛋 1 个','午餐：少油家常菜 2 道 + 半碗白米饭','晚餐：喝汤或不吃']}
];
const workouts=[{t:'大基数爬坡快走',d:'60 min · 低速小坡度 · 护膝',e:'🚶‍♀️'},{t:'徒手力量塑形',d:'30 min · 臀桥/深蹲/平板支撑',e:'🏋️‍♀️'},{t:'睡前拉伸放松',d:'12 min · 缓解酸痛',e:'🧘‍♀️'}];
let state=JSON.parse(localStorage.xiexiu||'{}'); if(!state.day) state={day:1,weight:166,target:151,streak:6,done:{},logs:[],water:0};
function save(){localStorage.xiexiu=JSON.stringify(state)}
function today(){return plan[state.day-1]||plan[0]}function isDone(k){return state.done[state.day]&&state.done[state.day][k]}function setDone(k,v=true){state.done[state.day]=state.done[state.day]||{};state.done[state.day][k]=v;state.logs.unshift({time:new Date().toLocaleString(),text:k+' 打卡完成'});save();render()}
const pages={home:home,data:dataPage,food:foodPage,sport:sportPage,mine:minePage};let current='home';
function render(){document.getElementById('screen').innerHTML=pages[current]();nav();bind();}
function nav(){let items=[['home','🏠','首页'],['data','📊','数据'],['sport','🏋️','运动'],['food','🥗','饮食'],['mine','👤','我的']];document.getElementById('nav').innerHTML=items.map(i=>`<button class="${current==i[0]?'active':''}" data-page="${i[0]}"><i>${i[1]}</i>${i[2]}</button>`).join('')}
function home(){let p=today(),done=['weight','food','sport'].some(isDone);return `<div class="top"><div class="hello"><span>👩🏻</span> 狠一点，<b>瘦下来</b></div><button class="iconbtn" data-open="remind">🔔</button></div><div class="search">⌕ 搜索秦昊食谱 / 运动 / 打卡</div><section class="hero"><h1>今日必须打卡</h1><p>体重、饮食、运动三选一即可完成。今天是第 ${p.d} 天：${p.title}。</p><button class="btn" data-open="check">立即打卡</button><div class="stamp">🔥</div></section><div class="section">三选一打卡 <span class="more">${done?'今日已完成':'还没打卡'}</span></div><div class="grid3"><button class="check ${isDone('weight')?'done':''}" data-open="weight"><div class="emoji">⚖️</div><b>体重</b><small>${state.weight}斤</small></button><button class="check ${isDone('food')?'done':''}" data-page="food"><div class="emoji">🥗</div><b>饮食</b><small>严格食谱</small></button><button class="check ${isDone('sport')?'done':''}" data-page="sport"><div class="emoji">🏃‍♀️</div><b>运动</b><small>90分钟</small></button></div><div class="section">今日秦昊计划 <span class="more" data-page="food">查看 ›</span></div><div class="card"><b style="font-size:22px">第 ${p.d} 天 · ${p.title}</b><p class="muted">预计掉秤 ${p.loss}｜${p.rule}</p><div class="list">${p.meals.slice(0,3).map((m,i)=>`<div class="row"><div class="badge">${['🥣','🍱','🌙'][i]}</div><div class="grow"><h4>${m.split('：')[0]}</h4><p>${m.split('：')[1]}</p></div></div>`).join('')}</div></div><div class="section">打卡日历</div><div class="cal">${[1,2,3,4,5,6,7].map(d=>`<div class="day ${d<state.day?'done':d==state.day?'today':''}">DAY<b>${d}</b></div>`).join('')}</div><p class="disclaimer">健康提示：本应用为打卡与记录工具，不替代医生/营养师建议。如头晕、心悸、低血糖或身体不适，应停止极低热量执行并寻求专业帮助。</p>`}
function dataPage(){let pct=Math.max(0,Math.min(100,Math.round((166-state.weight)/(166-state.target)*100)));return `<div class="top"><button class="iconbtn" data-page="home">‹</button><b style="font-size:18px">减脂数据看板</b><button class="iconbtn">⋯</button></div><div class="statbig"><div class="ring">${pct}%</div><div><h2 style="margin:0 0 8px">不是天赋，是强制养成</h2><p style="opacity:.78;margin:0">当前 ${state.weight}斤｜目标 ${state.target}斤</p></div></div><div class="section">核心数据</div><div class="metrics"><div class="metric"><span>今日摄入</span><b>530</b><small>kcal</small></div><div class="metric"><span>运动消耗</span><b>586</b><small>kcal</small></div><div class="metric"><span>热量缺口</span><b style="color:var(--green)">817</b><small>kcal</small></div><div class="metric"><span>连续打卡</span><b style="color:var(--red)">${state.streak}</b><small>天</small></div></div><div class="section">体重趋势 <span class="more">周/月/年</span></div><div class="chart"><svg viewBox="0 0 360 160"><path d="M0 130 C55 120 80 92 120 100 S190 50 240 66 S305 36 360 44" fill="none" stroke="#FF4D4F" stroke-width="6" stroke-linecap="round"/><path d="M0 130 C55 120 80 92 120 100 S190 50 240 66 S305 36 360 44 L360 160 L0 160 Z" fill="rgba(255,77,79,.08)"/><g fill="#36D399"><circle cx="120" cy="100" r="7"/><circle cx="240" cy="66" r="7"/><circle cx="338" cy="45" r="7"/></g></svg></div><div class="section">AI 监督助手</div>${['food','weight','sport'].some(isDone)?'<div class="success"><b>打卡成功！</b><br>今天的你，比昨天更自律。</div>':'<div class="warn"><b>今日未打卡！</b><br>再偷懒，连续打卡天数即将清零。先完成任意一项。</div>'}<div class="section">最近记录</div><div class="list">${(state.logs.slice(0,5).map(x=>`<div class="row"><div class="badge">✅</div><div><h4>${x.text}</h4><p>${x.time}</p></div></div>`).join('')||'<div class="card muted">暂无记录</div>')}</div>`}
function foodPage(){let p=today();return `<div class="top"><button class="iconbtn" data-page="home">‹</button><b style="font-size:18px">秦昊 15 天食谱</b><button class="iconbtn" data-open="day">📅</button></div><div class="tabs">${plan.map(x=>`<button class="${x.d==state.day?'active':''}" data-day="${x.d}">D${x.d}</button>`).join('')}</div><div class="card mealHero"><div class="food">${['🥛','🌽','🫐','🥚','🥦','🍅','🥬','🥩','🥗','🎂','🍠','🍞','🍚','🐟','🍱'][state.day-1]}</div><h2>第 ${p.d} 天 · ${p.title}</h2><p class="muted">${p.date}｜预计掉秤 ${p.loss}</p><span class="pill">${p.rule}</span></div><div class="section">今日三餐</div><div class="list">${p.meals.map((m,i)=>`<div class="row"><div class="badge">${['☀️','🍱','🌙','💧'][i]||'✅'}</div><div class="grow"><h4>${m.split('：')[0]}</h4><p>${m.split('：')[1]||m}</p></div><button class="chip ${isDone('food')?'active':''}" data-done="food">${isDone('food')?'已打卡':'打卡'}</button></div>`).join('')}</div><div class="section">严格规则</div><div class="warn"><b>禁止项：</b>零食、奶茶、油炸、夜宵、酒精、精加工食品。饮水 1800-2000ml。非食谱食物必须先拍照/手动记录热量。</div><button class="btn block purple" data-done="food">我已严格完成今日饮食</button>`}
function sportPage(){return `<div class="top"><button class="iconbtn" data-page="home">‹</button><b style="font-size:18px">每日固定运动</b><button class="iconbtn">⌕</button></div><div class="hero"><h1>90 分钟燃脂任务</h1><p>爬坡快走 1 小时 + 徒手力量 30 分钟。大基数低冲击，保护膝盖。</p><button class="btn" data-done="sport">完成运动打卡</button><div class="stamp">🏃‍♀️</div></div><div class="section">训练课程</div>${workouts.map((w,i)=>`<div class="workout" style="background:${['#BDEBFF','#F3C7F7','#E8F8EF'][i]}"><h3>${w.t}</h3><span class="pill">${w.d}</span><br><button class="btn ghost" style="height:42px;margin-top:18px" data-done="sport">开始 ▶</button><div class="person">${w.e}</div></div>`).join('')}<div class="section">动作要求</div><div class="card"><p><b>爬坡：</b>低速、小坡度，无跑跳。</p><p><b>力量：</b>臀桥、深蹲、平板支撑、手臂塑形，无负重。</p><p class="muted">运动结束自动同步热量消耗到数据看板。</p></div>`}
function minePage(){return `<div class="top"><b style="font-size:18px">我的</b><button class="iconbtn" data-open="remind">⚙️</button></div><div class="card profile"><div class="avatarbig">👩🏻</div><div><h2 style="margin:0">减肥邪修用户</h2><p class="muted" style="margin:4px 0 0">166斤大基数｜目标月瘦15斤</p></div></div><div class="section">目标管理</div><div class="metrics"><div class="metric"><span>当前体重</span><b>${state.weight}</b><small>斤</small></div><div class="metric"><span>目标体重</span><b>${state.target}</b><small>斤</small></div></div><button class="btn block" style="margin:14px 0" data-open="weight">更新体重</button><div class="section">功能</div><div class="list">${['全部打卡记录','个人打卡动态','收藏运动课程','消息中心','帮助与反馈'].map((x,i)=>`<div class="row"><div class="badge">${['📅','💬','⭐','🔔','❓'][i]}</div><div class="grow"><h4>${x}</h4><p>点击查看</p></div><span>›</span></div>`).join('')}</div>`}
function bind(){document.querySelectorAll('[data-page]').forEach(e=>e.onclick=()=>{current=e.dataset.page;render()});document.querySelectorAll('[data-day]').forEach(e=>e.onclick=()=>{state.day=+e.dataset.day;save();render()});document.querySelectorAll('[data-done]').forEach(e=>e.onclick=()=>setDone(e.dataset.done));document.querySelectorAll('[data-open]').forEach(e=>e.onclick=()=>openSheet(e.dataset.open))}
function openSheet(type){let s=document.getElementById('sheet'),m=document.getElementById('modal'); if(type=='weight')s.innerHTML=`<h2>体重打卡</h2><p class="muted">晨起空腹、上完厕所、固定衣物称重。</p><input class="input" id="w" type="number" step="0.1" value="${state.weight}" placeholder="今日体重（斤）"><button class="btn block" id="saveW">保存并打卡</button>`;else if(type=='check')s.innerHTML=`<h2>今日三选一打卡</h2><div class="grid3"><button class="check" data-sheetdone="weight"><div class="emoji">⚖️</div><b>体重</b></button><button class="check" data-sheetdone="food"><div class="emoji">🥗</div><b>饮食</b></button><button class="check" data-sheetdone="sport"><div class="emoji">🏃‍♀️</div><b>运动</b></button></div>`;else if(type=='day')s.innerHTML=`<h2>选择执行天数</h2><div class="switch">${plan.map(p=>`<button class="chip ${p.d==state.day?'active':''}" data-sheetday="${p.d}">D${p.d}</button>`).join('')}</div>`;else s.innerHTML=`<h2>提醒设置</h2><div class="row"><div class="badge">⚖️</div><div><h4>早间体重</h4><p>08:00 强制提醒</p></div></div><div class="row"><div class="badge">🥗</div><div><h4>晚间饮食</h4><p>20:30 未打卡警示</p></div></div><div class="row"><div class="badge">🏃‍♀️</div><div><h4>运动打卡</h4><p>21:30 运动催办</p></div></div>`;m.classList.add('show');m.onclick=e=>{if(e.target.id=='modal')m.classList.remove('show')};setTimeout(()=>{let w=document.getElementById('saveW');if(w)w.onclick=()=>{state.weight=+document.getElementById('w').value||state.weight;setDone('weight');m.classList.remove('show')};document.querySelectorAll('[data-sheetdone]').forEach(x=>x.onclick=()=>{setDone(x.dataset.sheetdone);m.classList.remove('show')});document.querySelectorAll('[data-sheetday]').forEach(x=>x.onclick=()=>{state.day=+x.dataset.sheetday;save();m.classList.remove('show');render()})},0)}
render();

if ('serviceWorker' in navigator) { window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
</script></body></html>
